name: Deploy Issues UI

on:
  push:
    branches: [main]
    paths:
      - 'services/issues-ui/**'
  workflow_dispatch:

concurrency:
  group: deploy-issues-ui
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    # Runs directly on Bootsy via self-hosted runner — no SSH needed.
    # Prerequisites:
    #   1. Node.js 20+ available on the runner
    #   2. /srv/issues-ui/ directory exists with correct permissions
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/issues-ui
    outputs:
      release_dir: ${{ steps.build.outputs.release_dir }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: services/issues-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
        run: npm run build

      - name: Create release directory
        id: build
        run: |
          DEPLOY_DIR="/srv/issues-ui"
          RELEASE_DIR="${DEPLOY_DIR}/releases/$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA:0:7}"
          mkdir -p "$RELEASE_DIR"
          cp -r dist/. "$RELEASE_DIR/"
          echo "release_dir=${RELEASE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Post build summary
        if: success()
        run: |
          echo "### Issues UI build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Release directory:** \`${{ steps.build.outputs.release_dir }}\`" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    steps:
      - name: Atomic symlink swap
        run: |
          RELEASE_DIR="${{ needs.build.outputs.release_dir }}"
          DEPLOY_DIR="/srv/issues-ui"
          ln -sfn "$RELEASE_DIR" "${DEPLOY_DIR}/next"
          mv -T "${DEPLOY_DIR}/next" "${DEPLOY_DIR}/current"

      - name: Prune old releases
        run: |
          DEPLOY_DIR="/srv/issues-ui"
          # Prune old releases, keep last 5.
          # Non-fatal: some releases may be owned by a different user (manual deploys
          # pre-dating the CI runner). Emit a warning rather than failing the deploy.
          # Manual cleanup on bootsy: sudo rm -rf /srv/issues-ui/releases/20260320-*
          if ! ls -1dt "${DEPLOY_DIR}/releases"/*/ | tail -n +6 | xargs -r rm -rf; then
            echo "::warning::Could not remove all old releases (permission denied on some). Manual cleanup needed on bootsy: sudo rm -rf ${DEPLOY_DIR}/releases/20260320-*"
          fi

      - name: Verify deployment
        run: |
          # Verify the symlink points to a directory with index.html
          if [ ! -f /srv/issues-ui/current/index.html ]; then
            echo "::error::Deployment verification failed — index.html not found"
            exit 1
          fi
          echo "==> Deployment verified: index.html present"

      - name: Post success summary
        if: success()
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "### Issues UI deployed successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${COMMIT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Release:** \`${{ needs.build.outputs.release_dir }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://cadence.bootsy.internal/" >> "$GITHUB_STEP_SUMMARY"

      - name: Post failure summary
        if: failure()
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "### Issues UI deployment failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${COMMIT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Check the logs above for details." >> "$GITHUB_STEP_SUMMARY"
