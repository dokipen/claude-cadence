name: Agent Service CI

on:
  push:
    branches:
      - main
    paths:
      - 'services/agents/**'
  pull_request:
    paths:
      - 'services/agents/**'

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/agents/go.mod

      - name: Run go vet
        working-directory: services/agents
        run: go vet ./...

      - name: Run unit tests
        working-directory: services/agents
        run: go test -v $(go list ./... | grep -v /test/e2e)

      - name: Run e2e tests
        working-directory: services/agents
        run: go test -v -count=1 -timeout 120s ./test/e2e/

  build:
    needs: lint-and-test
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/agents/go.mod

      - name: Build agentd
        working-directory: services/agents
        run: go build -o agentd ./cmd/agentd
