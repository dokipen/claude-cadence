name: Deploy Issues Service

on:
  workflow_run:
    workflows: ["Build Issues Service"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. sha-abc1234 or latest)'
        required: false
        default: 'latest'

concurrency:
  group: deploy-issues
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    # Only run if triggered manually or if the build workflow succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    # Runs directly on Bootsy via self-hosted runner — no SSH needed.
    # Prerequisites:
    #   1. ISSUES_JWT_SECRET repo secret set (matches the running service's JWT_SECRET)
    #   2. ISSUES_ALLOWED_USERS repo secret set (comma-separated GitHub logins)
    #   3. OAUTH_CLIENT_ID repo secret set (GitHub OAuth app client ID)
    #   4. OAUTH_SECRET repo secret set (GitHub OAuth app client secret)
    #   5. github-runner user is in the docker group
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15
    env:
      JWT_SECRET: ${{ secrets.ISSUES_JWT_SECRET }}
      ALLOWED_USERS: ${{ secrets.ISSUES_ALLOWED_USERS }}
      GITHUB_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_SECRET }}
    defaults:
      run:
        working-directory: services/issues
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Determine image tag
        id: tag
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_TAG="${INPUT_IMAGE_TAG}"
          else
            IMAGE_TAG="sha-${WORKFLOW_RUN_SHA:0:7}"
          fi
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Deploy
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "::error::ISSUES_JWT_SECRET secret is not set"
            exit 1
          fi
          echo "==> Deploying issues-service:${IMAGE_TAG}..."
          if ! docker image inspect "issues-service:${IMAGE_TAG}" > /dev/null 2>&1; then
            echo "::error::Image issues-service:${IMAGE_TAG} not found. Run the build workflow first."
            exit 1
          fi
          echo "==> Recreating container..."
          docker compose up -d --force-recreate --wait
          echo "==> Deploy complete"

      - name: Verify service is healthy
        run: |
          echo "==> Waiting for service to be ready..."
          for i in $(seq 1 30); do
            status=$(curl -so /dev/null -w '%{http_code}' \
              http://localhost:4000/graphql \
              -H 'Content-Type: application/json' \
              -d '{"query":"{ __typename }"}' 2>/dev/null || true)
            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              echo "==> Service is healthy (HTTP $status)"
              exit 0
            fi
            sleep 2
          done

          echo "::error::Service failed health check after 60 seconds"
          docker compose ps
          docker compose logs --tail=50
          exit 1

      - name: Post success summary
        if: success()
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "### Issues service deployed successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`issues-service:${IMAGE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${COMMIT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Service:** https://cadence.bootsy.internal/graphql" >> "$GITHUB_STEP_SUMMARY"

      - name: Post failure summary
        if: failure()
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "### Issues service deployment failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`issues-service:${IMAGE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${COMMIT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Check the logs above for details." >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -delete

  notify-cli-update:
    needs: deploy
    # Remind dev machines to rebuild the CLI after successful deploys.
    # The Bootsy CLI is rebuilt as part of install.sh via systemd on boot;
    # this notification is for other machines.
    # Skip on workflow_dispatch (manual/rollback deploys — no CLI source change).
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Post CLI update notice
        run: |
          echo "### Issues CLI updated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The issues CLI source was modified. Rebuild on dev machines:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "cd services/issues-cli && npm install && npm run build && npm link --prefix \"\$HOME/.local\"" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
