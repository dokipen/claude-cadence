name: Rollback Issues UI

on:
  workflow_dispatch:
    inputs:
      release_dir:
        description: "Release directory name (e.g. 20260321-235959-abc1234) or full path"
        required: true
        type: string

concurrency:
  group: rollback-issues-ui
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rollback:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    steps:
      - name: Resolve release directory
        id: resolve
        run: |
          INPUT="${{ inputs.release_dir }}"
          DEPLOY_DIR="/srv/issues-ui"
          # If input is just the basename, prepend the releases path
          if [[ "$INPUT" != /* ]]; then
            RELEASE_DIR="${DEPLOY_DIR}/releases/${INPUT}"
          else
            RELEASE_DIR="$INPUT"
          fi
          echo "release_dir=${RELEASE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Validate release exists
        run: |
          if [ ! -d "${{ steps.resolve.outputs.release_dir }}" ]; then
            echo "::error::Release directory ${{ steps.resolve.outputs.release_dir }} does not exist"
            echo ""
            echo "Available releases:"
            ls -1t /srv/issues-ui/releases/ || echo "(none)"
            exit 1
          fi
          if [ ! -f "${{ steps.resolve.outputs.release_dir }}/index.html" ]; then
            echo "::error::Release directory exists but index.html is missing — release may be corrupt"
            exit 1
          fi

      - name: Atomic symlink swap
        run: |
          DEPLOY_DIR="/srv/issues-ui"
          RELEASE_DIR="${{ steps.resolve.outputs.release_dir }}"
          ln -sfn "$RELEASE_DIR" "${DEPLOY_DIR}/next"
          mv -T "${DEPLOY_DIR}/next" "${DEPLOY_DIR}/current"
          echo "==> Rolled back to ${RELEASE_DIR}"

      - name: Verify deployment
        run: |
          if [ ! -f /srv/issues-ui/current/index.html ]; then
            echo "::error::Rollback verification failed — index.html not found after swap"
            exit 1
          fi
          echo "==> Rollback verified: index.html present"

      - name: Post success summary
        if: success()
        run: |
          echo "### Issues UI rolled back successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Release:** \`${{ steps.resolve.outputs.release_dir }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://cadence.bootsy.internal/" >> "$GITHUB_STEP_SUMMARY"

      - name: Post failure summary
        if: failure()
        run: |
          echo "### Issues UI rollback failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Attempted release:** \`${{ inputs.release_dir }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Check the logs above for details." >> "$GITHUB_STEP_SUMMARY"
