name: CI

on:
  # WARNING: Do not add pull_request_target — the fork-detection runs-on
  # expression checks event_name == 'pull_request' and would not protect
  # against pull_request_target, which runs fork code with base-repo secrets.
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

  # SECURITY: Fork PRs run on GitHub-hosted runners; internal PRs/pushes run on self-hosted.
  # This expression MUST be identical on every job below (except ci-status).
  # If you add a new job, copy this runs-on expression exactly.

jobs:
  changes:
    # fork → ubuntu-latest; internal → self-hosted (see SECURITY comment above)
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJSON('["self-hosted","Linux","X64"]') }}
    outputs:
      issues-service: ${{ steps.filter.outputs.issues-service }}
      issues-ui: ${{ steps.filter.outputs.issues-ui }}
      agent-service: ${{ steps.filter.outputs.agent-service }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            issues-service:
              - 'services/issues/**'
              - 'services/issues-cli/**'
            issues-ui:
              - 'services/issues-ui/**'
            agent-service:
              - 'services/agents/**'
      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -delete

  issues-service-test:
    needs: changes
    if: needs.changes.outputs.issues-service == 'true'
    # fork → ubuntu-latest; internal → self-hosted (see SECURITY comment above)
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJSON('["self-hosted","Linux","X64"]') }}
    defaults:
      run:
        working-directory: services/issues
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: services/issues/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Upload issues service build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: issues-service-build
          path: |
            services/issues/node_modules/
            services/issues/dist/
          retention-days: 1
      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -delete

  issues-cli-test:
    needs: [changes, issues-service-test]
    if: needs.changes.outputs.issues-service == 'true'
    # fork → ubuntu-latest; internal → self-hosted (see SECURITY comment above)
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJSON('["self-hosted","Linux","X64"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: services/issues-cli/package-lock.json
      - name: Download issues service build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: issues-service-build
          path: services/issues/
      - name: Restore Prisma CLI
        run: |
          cd services/issues
          chmod +x node_modules/@prisma/engines/* 2>/dev/null || true
          npm rebuild prisma @prisma/client
          npx prisma generate
      - name: Test CLI
        run: cd services/issues-cli && npm ci && npm run typecheck && npm test
      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -delete

  issues-service-docker:
    needs: [changes, issues-service-test, issues-cli-test]
    if: needs.changes.outputs.issues-service == 'true'
    # fork → ubuntu-latest; internal → self-hosted (see SECURITY comment above)
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJSON('["self-hosted","Linux","X64"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - name: Build Docker image
        run: docker build --iidfile /tmp/ci-docker-iid services/issues/
      - name: Cleanup Docker image
        if: always()
        run: |
          if [ -f /tmp/ci-docker-iid ]; then
            docker rmi "$(cat /tmp/ci-docker-iid)" 2>/dev/null || true
            rm -f /tmp/ci-docker-iid
          fi
      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -delete

  issues-ui-ci:
    needs: changes
    if: needs.changes.outputs.issues-ui == 'true'
    # fork → ubuntu-latest; internal → self-hosted (see SECURITY comment above)
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJSON('["self-hosted","Linux","X64"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            services/issues/package-lock.json
            services/issues-ui/package-lock.json
      - name: Build issues service (needed for e2e)
        run: cd services/issues && npm ci && npx prisma generate && npm run build
      - name: Install issues-ui dependencies
        run: cd services/issues-ui && npm ci
      - name: Typecheck
        run: cd services/issues-ui && npm run typecheck
      - name: Install Playwright browsers and system deps
        run: cd services/issues-ui && npx playwright install --with-deps chromium
      - name: Kill stale processes on E2E ports
        run: |
          for port in 14444 5174; do
            lsof -t -i :"$port" | xargs -r kill -9 2>/dev/null || true
          done
      - name: Run e2e tests
        run: cd services/issues-ui && npm run test:e2e
        env:
          CI: true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: services/issues-ui/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -delete

  agent-service-test:
    needs: changes
    if: needs.changes.outputs.agent-service == 'true'
    # fork → ubuntu-latest; internal → self-hosted (see SECURITY comment above)
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJSON('["self-hosted","Linux","X64"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/agents/go.mod
          cache-dependency-path: services/agents/go.sum
      - name: Run go vet
        working-directory: services/agents
        run: go vet ./...
      - name: Run unit tests
        working-directory: services/agents
        run: go test -v $(go list ./... | grep -v /test/e2e)
      - name: Run e2e tests
        working-directory: services/agents
        run: go test -v -count=1 -timeout 120s ./test/e2e/
      - name: Build agentd
        working-directory: services/agents
        run: go build -o agentd ./cmd/agentd
      - name: Cleanup workspace
        if: always()
        run: find "$GITHUB_WORKSPACE" -mindepth 1 -delete

  ci-status:
    if: always()
    needs:
      - changes
      - issues-service-test
      - issues-cli-test
      - issues-service-docker
      - issues-ui-ci
      - agent-service-test
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        env:
          CHANGES: ${{ needs.changes.result }}
          ISSUES_TEST: ${{ needs.issues-service-test.result }}
          ISSUES_CLI: ${{ needs.issues-cli-test.result }}
          ISSUES_DOCKER: ${{ needs.issues-service-docker.result }}
          ISSUES_UI: ${{ needs.issues-ui-ci.result }}
          AGENT_TEST: ${{ needs.agent-service-test.result }}
        run: |
          echo "Changes:        $CHANGES"
          echo "Issues service: $ISSUES_TEST"
          echo "Issues CLI:     $ISSUES_CLI"
          echo "Issues Docker:  $ISSUES_DOCKER"
          echo "Issues UI:      $ISSUES_UI"
          echo "Agent service:  $AGENT_TEST"

          # Fail if any job failed or was cancelled (skipped is OK — means path filter excluded it)
          for result in "$CHANGES" "$ISSUES_TEST" "$ISSUES_CLI" "$ISSUES_DOCKER" "$ISSUES_UI" "$AGENT_TEST"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::One or more CI jobs failed or were cancelled"
              exit 1
            fi
          done

          echo "All CI checks passed (or were skipped)"
