# Dev/QA stack for Claude Cadence
#
# All services share a private bridge network (cadence-dev). Only the Vite dev
# server and Caddy are exposed to the host. Inter-service communication uses
# Docker DNS names.
#
# Full stack (issues + issues-ui + Caddy + agent-hub + agentd):
#   docker compose -f docker-compose.dev.yml up
#
# Override host ports via environment variables:
#   ISSUES_UI_HOST_PORT=5174 CADDY_PORT=8080 docker compose -f docker-compose.dev.yml up
#
# Prerequisites:
#   cp .env.dev.example .env.dev
#   # Fill in .env.dev with real secrets before starting

services:
  issues:
    build:
      context: services/issues
    restart: unless-stopped
    networks:
      - cadence-dev
    volumes:
      - issues-data:/app/data
    env_file: .env.dev
    environment:
      - DATABASE_URL=file:/app/data/issues.db
      - PORT=4000
      - DEV_SEED=1
      - AUTH_BYPASS=1 # dev only — bypasses login
    healthcheck:
      # Use node (available in the Node.js image) to avoid BusyBox wget
      # limitations with --header/--post-data flags.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/graphql', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 3s
      start_period: 60s
      retries: 5

  issues-ui:
    build:
      context: services/issues-ui
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    networks:
      - cadence-dev
    ports:
      # Binds 0.0.0.0 by default for remote LAN access. Override with e.g. ISSUES_UI_HOST_PORT=127.0.0.1:5173
      - "${ISSUES_UI_HOST_PORT:-5173}:5173"
    volumes:
      # Bind-mount source for hot reload; anonymous volume preserves node_modules
      - ./services/issues-ui:/app
      - /app/node_modules
    env_file: .env.dev
    environment:
      # Vite proxy targets: use Docker DNS names so the dev server can reach
      # sibling containers. Defaults in vite.config.ts fall back to localhost
      # for non-Docker local dev.
      - VITE_API_HOST=issues
      - VITE_AGENT_HUB_HOST=agent-hub
      - VITE_AUTH_BYPASS=1 # dev only — bypasses login
      - CHOKIDAR_USEPOLLING=true # required for HMR across Docker bind mounts
    depends_on:
      issues:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    networks:
      - cadence-dev
    ports:
      - "${QA_HOST:-0.0.0.0}:${QA_PORT:-80}:80"
    volumes:
      - ./infrastructure/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    env_file: .env.dev
    depends_on:
      - issues
      - issues-ui

  # Agent services — included in the default stack
  #
  # Both services are fully containerized. agentd mounts ~/.claude from the host
  # so the claude CLI can authenticate using the developer's existing credentials.
  #
  # Prerequisites:
  #   - Fill in HUB_API_TOKEN, HUB_AGENT_TOKEN, and AGENTD_TOKEN in .env.dev
  #   - Ensure ~/.claude exists with valid claude CLI credentials

  agent-hub:
    build:
      context: services
      dockerfile: agent-hub/Dockerfile
    restart: unless-stopped
    networks:
      - cadence-dev
    env_file: .env.dev
    depends_on:
      - issues
    healthcheck:
      # All API endpoints require auth; use a TCP check instead.
      test: ["CMD-SHELL", "nc -z localhost 4200 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

  agentd:
    build:
      context: services
      dockerfile: agents/Dockerfile
    restart: unless-stopped
    networks:
      - cadence-dev
    volumes:
      - agentd-data:/var/lib/agentd
      # Mount ~/.claude read-write: the claude CLI writes session data here.
      - ${HOME}/.claude:/home/agentd/.claude
    env_file: .env.dev
    healthcheck:
      # Check hub connection via the hub's health endpoint (agentd uses relay path,
      # no local HTTP server on port 4142 when advertise_address is not set).
      test: ["CMD-SHELL", "nc -z agent-hub 4200 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3
    depends_on:
      agent-hub:
        condition: service_healthy

networks:
  cadence-dev:
    driver: bridge

volumes:
  issues-data:
  caddy-data:
  caddy-config:
  agentd-data:
