# agentd configuration example
# Copy to ~/.config/agentd/config.yaml and customize.

# Network binding
host: "127.0.0.1"
port: 4141

# Root directory for git clones and worktrees
root_dir: "/var/lib/agentd"

# PTY manager
pty:
  buffer_size: 1048576       # Ring buffer size in bytes (default: 1 MB)
  websocket_scheme: "ws"     # WebSocket scheme for terminal endpoint: "ws" (default) or "wss" for TLS deployments

# Logging
log:
  level: "info"    # debug, info, warn, error
  format: "json"   # json, text

# Stale session cleanup
cleanup:
  stale_session_ttl: "24h"   # Destroy stopped sessions after this duration
  check_interval: "5m"       # How often to check for stale sessions

# Agent profiles
profiles:
  claude-reviewer:
    repo: "https://github.com/org/project.git"
    command: "claude --model sonnet --permission-mode accept{{if .PluginDir}} --plugin-dir {{.PluginDir}}{{end}} --cwd {{.WorktreePath}} {{.ExtraArgs}}"
    plugin_dir: "/opt/cadence/plugin"  # Plugin directory (available as {{.PluginDir}} in command template)
    description: "Claude Code reviewer"

  claude-opus:
    repo: "https://github.com/org/project.git"
    command: "claude --model opus --permission-mode accept{{if .PluginDir}} --plugin-dir {{.PluginDir}}{{end}} --cwd {{.WorktreePath}} {{.ExtraArgs}}"
    plugin_dir: "/opt/cadence/plugin"
    description: "Claude Opus agent"
