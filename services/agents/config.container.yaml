host: "0.0.0.0"
port: 4141
root_dir: /var/lib/agentd
auth:
  mode: token
  token_env_var: AGENTD_TOKEN
hub:
  url: ws://agent-hub:4200/ws/agent
  name: dev
  token_env_var: HUB_AGENT_TOKEN
pty:
  websocket_scheme: ws
# advertise_address is used both as the HTTP bind address and as the host:port
# returned to agent-hub for terminal proxy back-connections. "agentd" resolves
# to this container's bridge IP via /etc/hosts (set by Docker when hostname: agentd
# is configured in docker-compose.dev.yml). agent-hub resolves it via Docker DNS.
ttyd:
  advertise_address: "agentd:4142"
profiles:
  claude:
    repo: "https://github.com/dokipen/claude-cadence.git"
    command: claude
