root_dir: /var/lib/agentd
log:
  level: debug
session:
  dir: /var/lib/agentd/sessions
auth:
  mode: token
  token_env_var: AGENTD_TOKEN
hub:
  url: ws://agent-hub:4200/ws/agent
  name: dev
  token_env_var: HUB_AGENT_TOKEN
pty:
  websocket_scheme: ws
# advertise_address is intentionally omitted here so the relay path is used
# (agentd sends {relay: true} in getTerminalEndpoint responses). This allows
# integration testing of the relay path in the docker-compose stack.
# For direct-dial (hub back-connects to agentd:4142), set: agentd:4142
ttyd: {}
profiles:
  bash:
    repo: "https://github.com/dokipen/claude-cadence.git"
    command: bash
  bash-nohup:
    repo: "https://github.com/dokipen/claude-cadence.git"
    command: "bash -c 'trap \"\" HUP; exec bash'"
