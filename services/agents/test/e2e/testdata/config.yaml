host: "127.0.0.1"
port: 0  # random port for tests

log:
  level: "debug"
  format: "text"

profiles:
  sleeper:
    command: "sleep 3600"
    description: "Long-running sleep process"
  fast-exit:
    command: "true"
    description: "Exits immediately with status 0"
  echo-and-exit:
    command: "bash -c 'echo hello && sleep 1'"
    description: "Echoes and exits after 1s"
  echo-args:
    command: "echo {{.ExtraArgs}}"
    description: "Echoes extra args for testing shell escaping"
