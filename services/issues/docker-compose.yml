services:
  issues:
    image: issues-service:${IMAGE_TAG:-latest}
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - issues-data:/app/data
    # Overrides the Dockerfile HEALTHCHECK so `docker compose up --wait` can
    # gate on service readiness. Duplicated intentionally: the Dockerfile
    # healthcheck covers standalone `docker run`; this one covers compose.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/graphql", "--header=Content-Type: application/json", "--post-data={\"query\":\"{ __typename }\"}"]
      interval: 10s
      timeout: 3s
      start_period: 60s
      retries: 5
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/issues.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set. Run ./install.sh or create a .env file.}
      - ALLOWED_USERS=${ALLOWED_USERS:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:?GITHUB_CLIENT_SECRET must be set. Run ./install.sh or create a .env file.}
      - PORT=4000

volumes:
  issues-data:
