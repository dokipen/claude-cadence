host: "127.0.0.1"
port: 4200

auth:
  mode: "token"
  token_env_var: "HUB_API_TOKEN"

hub_auth:
  token_env_var: "HUB_AGENT_TOKEN"

heartbeat:
  interval: "30s"
  timeout: "10s"

agent_ttl: "5m"

# Rate limiting applied to all endpoints (REST API, /ws/agent, /ws/terminal/).
# Limits are per source IP address.
rate_limit:
  requests_per_second: 100  # token replenishment rate (default: 100)
  burst: 200                 # maximum burst size (default: 200)

log:
  level: "info"
  format: "json"
