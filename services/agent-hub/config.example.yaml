host: "127.0.0.1"
port: 4200

auth:
  mode: "token"
  token_env_var: "HUB_API_TOKEN"

hub_auth:
  token_env_var: "HUB_AGENT_TOKEN"

# allowed_origins limits which browser origins can connect to the terminal WebSocket.
# Set this to the frontend URL(s) served by your reverse proxy (e.g. Caddy).
# Required when binding to a non-loopback address or running behind a reverse proxy:
# when empty, the terminal WebSocket accepts connections from any browser origin (CSRF
# risk) and a startup warning is emitted.
allowed_origins:
  - "https://your-domain.example.com"

heartbeat:
  interval: "30s"
  timeout: "10s"
  # keepalive_interval controls how often protocol-level WebSocket pings (RFC 6455
  # opcode 0x9) are sent on agent connections to prevent NAT/firewall devices from
  # silently dropping idle TCP connections. Should be less than the interval.
  keepalive_interval: "15s"

agent_ttl: "5m"

# Rate limiting applied to all endpoints (REST API, /ws/agent, /ws/terminal/).
# Limits are per source IP address.
rate_limit:
  requests_per_second: 100  # token replenishment rate (default: 100)
  burst: 200                 # maximum burst size (default: 200)

log:
  level: "info"
  format: "json"
