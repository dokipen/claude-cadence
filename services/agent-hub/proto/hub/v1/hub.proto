syntax = "proto3";

package hub.v1;

option go_package = "github.com/dokipen/claude-cadence/services/agent-hub/gen/hub/v1;hubv1";

// Session represents an active or historical agent session.
// Fields marked optional correspond to Go `omitempty` JSON tags and may be
// absent from responses when the value is zero/empty.
message Session {
  string id = 1;
  string name = 2;
  string agent_profile = 3;
  // State is one of: "creating", "running", "stopped", "error", "destroying"
  string state = 4;
  optional string worktree_path = 5;
  optional string repo_url = 6;
  // base_ref is optional because Go serializes it with omitempty; it may be
  // absent when the session was not created with a specific base ref.
  optional string base_ref = 7;
  reserved 8;
  reserved "tmux_session";
  // created_at is an RFC3339 timestamp string.
  string created_at = 9;
  optional string error_message = 10;
  // agent_pid is optional because Go serializes int with omitempty (zero == absent).
  optional int32 agent_pid = 11;
  optional string websocket_url = 12;
  bool waiting_for_input = 13;
  optional string idle_since = 14;
}

// AgentProfile describes a named configuration profile for an agent.
message AgentProfile {
  string description = 1;
  // repo is empty string when not specified.
  string repo = 2;
}

// Agent represents an available agent with its profiles and status.
message Agent {
  string name = 1;
  map<string, AgentProfile> profiles = 2;
  // status is "online" or "offline".
  string status = 3;
  // last_seen is an RFC3339 timestamp string.
  string last_seen = 4;
}

// CreateSessionRequest is the JSON body for POST /sessions/:agentName/sessions.
message CreateSessionRequest {
  string agent_profile = 1;
  string session_name = 2;
  optional string base_ref = 3;
  map<string, string> env = 4;
  repeated string extra_args = 5;
}

// CreateSessionResponse wraps the created session.
message CreateSessionResponse {
  Session session = 1;
}

// ListSessionsResponse wraps a list of sessions.
message ListSessionsResponse {
  repeated Session sessions = 1;
}

// ListAgentsResponse wraps a list of available agents.
message ListAgentsResponse {
  repeated Agent agents = 1;
}
